<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodChef - 今日の気分で決めるレシピ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-decoration">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>
    <div id="app">
        <header>
            <h1>MoodChef</h1>
            <nav class="main-nav">
                <button id="nav-home" class="nav-btn active">レシピを探す</button>
                <button id="nav-community" class="nav-btn">コミュニティ</button>
            </nav>
            <p class="subtitle">今の気分は？</p>
        </header>

        <main id="main-content">
            <!-- レシピ提案セクション -->
            <div id="recipe-section-container">
                <section id="mood-selection">
                    <div class="mood-grid" id="mood-grid">
                        <!-- JSで動的に生成 -->
                    </div>
                </section>

                <section id="recipe-display" class="hidden">
                    <div id="recipe-card" class="recipe-card">
                        <!-- JSで動的に生成 -->
                    </div>
                    <button id="back-button" class="btn-secondary">選び直す</button>
                </section>
            </div>

            <!-- コミュニティセクション -->
            <section id="community-section" class="hidden">
                <div class="post-form-card">
                    <h3>料理をシェアする</h3>
                    <form id="post-form">
                        <div class="form-group">
                            <input type="text" id="post-title" placeholder="料理名" required>
                        </div>
                        <div class="form-group">
                            <select id="post-mood" required>
                                <option value="" disabled selected>気分を選択</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <textarea id="post-comment" placeholder="今日の料理のポイントは？" rows="2" required></textarea>
                        </div>
                        <button type="submit" class="btn-primary">投稿する</button>
                    </form>
                </div>

                <div class="community-feed" id="community-feed">
                    <!-- JSで動的に生成 -->
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 MoodChef</p>
        </footer>
    </div>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
